name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Build Kaappi and dependencies
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi.git /tmp/kaappi
          cd /tmp/kaappi && zig build -Doptimize=ReleaseSafe
          git clone --depth 1 https://github.com/kaappi/kaappi-net.git /tmp/kaappi-net
          cd /tmp/kaappi-net && make
          git clone --depth 1 https://github.com/kaappi/kaappi-json.git /tmp/kaappi-json
          git clone --depth 1 https://github.com/kaappi/kaappi-http.git /tmp/kaappi-http

      - name: Run routing tests
        run: |
          export LD_LIBRARY_PATH=/tmp/kaappi-net
          /tmp/kaappi/zig-out/bin/kaappi --coverage-xml coverage.xml --lib-path lib --lib-path /tmp/kaappi-net/lib --lib-path /tmp/kaappi-json/lib --lib-path /tmp/kaappi-http/lib tests/test-routing.scm

      - name: Upload to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
